name: Run tests

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests (H2 in-memory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run Unit Tests
        run: mvn -B clean test --file pom.xml -Dtest='!*ServiceTest,!*IntegrationTest,!RetryTest'

  integration-tests:
    name: Integration Tests (Docker/Testcontainers)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run Integration Tests
        run: mvn -B clean test --file pom.xml -Dtest='*ServiceTest,*IntegrationTest,RetryTest'