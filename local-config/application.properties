# Local development application.properties working with docker compose

# Admin credentials
controller.auth.admin.username=admin
controller.auth.admin.password=admin123

# Database configuration
spring.datasource.url=jdbc:postgresql://postgres:5432/seqcol_db
spring.datasource.username=seqcol_user
