# Profile for SeqCol integration tests using Testcontainers with PostgreSQL
# Database credentials are overridden by @DynamicPropertySource in the test classes

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

ftp.proxy.host=null
ftp.proxy.port=0

asm.file.download.dir=/tmp
service.info.file.path=classpath:/static/service-info.json

config.scaffolds.enabled=true

# Admin credentials for testing
controller.auth.admin.username=admin
controller.auth.admin.password=admin

server.servlet.context-path=/eva/webservices/seqcol
