name: Run tests

on:
  push:
    branches: [ master, java21 ]
  pull_request:
    branches: [ master, java21 ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      matrix:
        java-version: [ 21 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run Maven tests
        run: mvn -B clean test

