
stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: dockerhub.ebi.ac.uk
  DOCKER_IMAGE: dockerhub.ebi.ac.uk/ebivariation/eva-seqcol
  K8S_REPO_URL: https://github.com/EBIvariation/eva-k8s.git

# REQUIRED GitLab CI/CD Variables (Global):
# DOCKER_REGISTRY_USER: Username for Docker registry authentication
# DOCKER_REGISTRY_PASSWORD: Password for Docker registry authentication
# GITHUB_USER: GitHub username for accessing private maven settings repository
# GITHUB_TOKEN: GitHub personal access token for accessing private maven settings repository
# MEDIA_TYPE: GitHub API media type for raw file access (e.g. application/vnd.github.v3.raw)
#
# ENVIRONMENT-SPECIFIC VARIABLES (suffixed with _DEV and _PROD):
# URL_MAVEN_SETTINGS_DEV: GitHub URL to dev Maven settings XML file
# URL_MAVEN_SETTINGS_PROD: GitHub URL to prod Maven settings XML file
# KUBECONFIG_CONTENT_DEV: Base64-encoded kubeconfig for dev cluster
# KUBECONFIG_CONTENT_PROD: Base64-encoded kubeconfig for prod cluster
#
# The maven-settings.xml file should contain profiles with Maven properties like:
# - app.db.url, app.db.username, app.db.password
# - app.admin.username, app.admin.password
# - app.ftp.proxy.host, app.ftp.proxy.port
# - app.scaffolds.enabled
# - app.ddl.behaviour
#
# These are converted to Spring Boot application.properties by scripts/maven-settings-to-properties.py

# ============================================================================
# Base Job Templates
# ============================================================================

.build_docker:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--storage-driver=overlay2", "--insecure-registry=localhost"]
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - echo "Waiting for Docker daemon to be ready..."
    - docker info
    - echo -n $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin $DOCKER_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$IMAGE_TAG -t $DOCKER_IMAGE:$IMAGE_LATEST .
    - docker push $DOCKER_IMAGE:$IMAGE_TAG
    - docker push $DOCKER_IMAGE:$IMAGE_LATEST
    - echo "IMAGE_TAG=$IMAGE_TAG" > build.env
  artifacts:
    reports:
      dotenv: build.env

.update_and_deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl python3 kubectl
    - python3 -m venv $HOME/.venv
    - source $HOME/.venv/bin/activate
    - pip install --no-cache-dir PyYAML
    - git config --global user.email "gitlab-ci@ebi.ac.uk"
    - git config --global user.name "GitLab CI"
    - git config --global credential.helper store
    - echo "https://${GITHUB_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_CONTENT" | base64 -d > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - source $HOME/.venv/bin/activate
    # Download Maven settings from private repository
    - curl -u $GITHUB_USER:$GITHUB_TOKEN -H "Accept:$MEDIA_TYPE" $URL_MAVEN_SETTINGS > maven-settings.xml
    # Clone eva-k8s for scripts and manifests
    - git clone --depth 1 https://github.com/EBIvariation/eva-k8s.git k8s-repo
    - cd k8s-repo
    # Convert Maven settings to application.properties
    - python scripts/maven-settings-to-properties.py --maven_file ../maven-settings.xml --property_set eva-seqcol --profile $ENV > application.properties
    # Create Kubernetes secret with the generated application.properties
    - kubectl create secret generic eva-seqcol-config --from-file=application.properties -n $K8S_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
    # Update image tag in kustomization
    - python scripts/update-image-tag.py "$K8S_MANIFEST_PATH/kustomization.yaml" "${IMAGE_TAG}"
    - git add "$K8S_MANIFEST_PATH/kustomization.yaml"
    - git commit -m "Update eva-seqcol ${ENV} image tag to ${IMAGE_TAG}"
    - git push https://${GITHUB_TOKEN}:x-oauth-basic@github.com/EBIvariation/eva-k8s.git main
    # Deploy to cluster
    - kubectl apply -k $K8S_MANIFEST_PATH
    - kubectl rollout status deployment/eva-seqcol -n $K8S_NAMESPACE --timeout=5m
  environment:
    kubernetes:
      namespace: $K8S_NAMESPACE

# ============================================================================
# PRODUCTION: Deploy on git tags
# ============================================================================

build:docker:prod:
  extends: .build_docker
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG
    IMAGE_LATEST: latest
  only:
    - tags

deploy-to-cluster:prod:
  extends: .update_and_deploy
  needs:
    - build:docker:prod
  variables:
    ENV: prod
    K8S_MANIFEST_PATH: k8s-manifests/eva-seqcol/overlays/prod
    K8S_NAMESPACE: eva-seqcol-prod
    # Production-specific environment variables
    DB_HOST: $METADATA_DB_HOST_PROD
    DB_PORT: $METADATA_DB_PORT_PROD
    DB_USER: $METADATA_DB_USER_PROD
    DB_PASSWORD: $METADATA_DB_PASSWORD_PROD
    SPRING_DATASOURCE_URL: $METADATA_DB_SPRING_DATASOURCE_URL_PROD
    ADMIN_USER: $SEQCOL_ADMIN_USER_PROD
    ADMIN_PASSWORD: $SEQCOL_ADMIN_PASSWORD_PROD
    KUBECONFIG_CONTENT: $KUBECONFIG_CONTENT_PROD
  environment:
    name: prod
  only:
    - tags

# ============================================================================
# DEVELOPMENT: Deploy on main branch
# ============================================================================

build:docker:dev:
  extends: .build_docker
  variables:
    IMAGE_TAG: dev-$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: dev-latest
  only:
    - main

deploy-to-cluster:dev:
  extends: .update_and_deploy
  needs:
    - build:docker:dev
  variables:
    ENV: dev
    K8S_MANIFEST_PATH: k8s-manifests/eva-seqcol/overlays/dev
    K8S_NAMESPACE: eva-seqcol-dev
    # Development-specific environment variables
    DB_HOST: $METADATA_DB_HOST_DEV
    DB_PORT: $METADATA_DB_PORT_DEV
    DB_USER: $METADATA_DB_USER_DEV
    DB_PASSWORD: $METADATA_DB_PASSWORD_DEV
    SPRING_DATASOURCE_URL: $METADATA_DB_SPRING_DATASOURCE_URL_DEV
    ADMIN_USER: $SEQCOL_ADMIN_USER_DEV
    ADMIN_PASSWORD: $SEQCOL_ADMIN_PASSWORD_DEV
    KUBECONFIG_CONTENT: $KUBECONFIG_CONTENT_DEV
  environment:
    name: dev
  only:
    - main
