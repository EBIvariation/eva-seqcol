
spring.profiles.active=seqcol
management.endpoints.web.exposure.include=info,health
management.endpoints.web.base-path=/
management.info.git.mode=full

logging.level.uk.ac.ebi.eva.contigalias=DEBUG

# Database configuration (override with environment variables at runtime)
# spring.datasource.url=jdbc:postgresql://localhost:5432/seqcol_db
# spring.datasource.username=postgres
# spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

# Admin credentials (override with environment variables at runtime)
# controller.auth.admin.username=admin
# controller.auth.admin.password=admin

server.servlet.context-path=/eva/webservices/seqcol
server.port=8081

# FTP proxy settings (override with environment variables at runtime)
# ftp.proxy.host=
# ftp.proxy.port=0

# Scaffolds configuration (override with environment variables at runtime)
# config.scaffolds.enabled=true

asm.file.download.dir=/tmp
service.info.file.path=src/main/resources/static/service-info.json

# remove spring data browsing endpoints (https://docs.spring.io/spring-data/rest/docs/3.3.x/reference/html/#getting-started.setting-repository-detection-strategy)
spring.data.rest.detection-strategy=annotated

spring.data.rest.basePath=/api

# Swagger Configuration
springdoc.swagger-ui.path=/seqcol-documentation
springdoc.api-docs.path=/seqcol-api-docs

springdoc.packages-to-scan=uk.ac.ebi.eva.evaseqcol.controller
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
