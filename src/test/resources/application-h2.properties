spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName = org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/console/

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

ftp.proxy.host=null
ftp.proxy.port=0

asm.file.download.dir=/tmp
service.info.file.path=classpath:/static/service-info.json

config.scaffolds.enabled=true

# Admin credentials for testing
controller.auth.admin.username=admin
controller.auth.admin.password=admin

server.servlet.context-path=/eva/webservices/seqcol