# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests (H2 in-memory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Run Unit Tests
      run: mvn -B clean test --file pom.xml -Dtest='!*IntegrationTest'

  integration-tests:
    name: Integration Tests (Docker/Testcontainers)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Run Integration Tests
      run: mvn -B clean test --file pom.xml -Dtest='*IntegrationTest'
