name: Java CI with Maven

on:
  push:
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests (H2 in-memory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Run Unit Tests
      run: mvn -B clean test --file pom.xml -Dtest='!*ServiceTest,!*IntegrationTest,!RetryTest'

  integration-tests:
    name: Integration Tests (Docker/Testcontainers)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 8
      uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven
    - name: Run Integration Tests
      run: mvn -B clean test --file pom.xml -Dtest='*ServiceTest,*IntegrationTest,RetryTest'
