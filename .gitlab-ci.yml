
stages:
  - build
  - deploy

variables:
  DOCKER_REGISTRY: dockerhub.ebi.ac.uk
  DOCKER_IMAGE: dockerhub.ebi.ac.uk/ebivariation/eva-seqcol
  K8S_REPO_URL: https://github.com/EBIvariation/eva-k8s.git
  MAVEN_SETTINGS: maven-settings.xml
  URL_MAVEN_SETTINGS: https://api.github.com/repos/EBIvariation/configuration/contents/eva-maven-settings.xml
  KUBECONFIG_FILE_DEV: https://api.github.com/repos/EBIvariation/configuration/contents/kubernetes-clusters/development-k8s-team-admin-conf.conf
  KUBECONFIG_FILE_STAGING: https://api.github.com/repos/EBIvariation/configuration/contents/kubernetes-clusters/staging-k8s-team-admin-conf.conf
  MEDIA_TYPE: application/vnd.github.raw

# REQUIRED GitLab CI/CD Variables (Global):
# DOCKER_REGISTRY_USER: Username for Docker registry authentication
# DOCKER_REGISTRY_PASSWORD: Password for Docker registry authentication
# GITHUB_USER: GitHub username for accessing private maven settings repository
# GITHUB_TOKEN: GitHub personal access token for accessing private maven settings repository


# ============================================================================
# Base Job Templates
# ============================================================================

.build_docker:
  stage: build
  image: docker:latest
  services:
    - name: docker:dind
      alias: docker
      command: ["--storage-driver=overlay2", "--insecure-registry=localhost"]
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - echo "Waiting for Docker daemon to be ready..."
    - docker info
    - echo -n $DOCKER_REGISTRY_PASSWORD | docker login -u $DOCKER_REGISTRY_USER --password-stdin $DOCKER_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE:$IMAGE_TAG -t $DOCKER_IMAGE:$IMAGE_LATEST .
    - docker push $DOCKER_IMAGE:$IMAGE_TAG
    - docker push $DOCKER_IMAGE:$IMAGE_LATEST

.update_and_deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git curl python3 kubectl
    - python3 -m venv $HOME/.venv
    - source $HOME/.venv/bin/activate
    - git config --global user.email "gitlab-ci@ebi.ac.uk"
    - git config --global user.name "GitLab CI"
    - git config --global credential.helper store
    # Clone eva-k8s for scripts and manifests
    - git clone --depth 1 https://github.com/EBIvariation/eva-k8s.git k8s-repo
    - cd k8s-repo
    - pip install --no-cache-dir lxml retry cached-property pyyaml requests
    - pip install --no-dependencies -r scripts/requirements.txt
    - echo "https://${GITHUB_TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials
    - mkdir -p ~/.kube
    # Download kubernetes cluster configuration from private repository
    - curl -u $GITHUB_USER:$GITHUB_TOKEN -H "Accept:$MEDIA_TYPE" $KUBECONFIG_FILE > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    - source $HOME/.venv/bin/activate
    # Download Maven settings from private repository
    - curl -u $GITHUB_USER:$GITHUB_TOKEN -H "Accept:$MEDIA_TYPE" $URL_MAVEN_SETTINGS > maven-settings.xml
    # Convert Maven settings to application.properties
    - python scripts/maven-settings-to-properties.py --maven_file maven-settings.xml --property_set eva-seqcol --profile $MAVEN_PROFILE --output application.properties
    # Update image tag in kustomization
    - python scripts/update-image-tag.py "$K8S_MANIFEST_PATH/kustomization.yaml" "${IMAGE_TAG}"
    - git add "$K8S_MANIFEST_PATH/kustomization.yaml"
    # Only commit if the image tag has changed
    - |
      if ! git diff --cached --quiet; then
        git commit -m "Update eva-seqcol ${ENV} image tag to ${IMAGE_TAG}"
        git push https://${GITHUB_TOKEN}:x-oauth-basic@github.com/EBIvariation/eva-k8s.git main
      fi

    # Copy the application.properties where it is expected -- DO NOT COMMIT
    - cp -vf application.properties $K8S_MANIFEST_PATH/

    # Deploy to cluster
    - kubectl apply -k $K8S_MANIFEST_PATH
    - kubectl rollout status deployment/eva-seqcol -n $K8S_NAMESPACE --timeout=5m
  environment:
    kubernetes:
      namespace: $K8S_NAMESPACE

# ============================================================================
# PRODUCTION: Deploy on git tags
# ============================================================================

build:docker:prod:
  extends: .build_docker
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG
    IMAGE_LATEST: latest
  only:
    - tags

deploy-to-cluster:prod:
  extends: .update_and_deploy
  needs:
    - build:docker:prod
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG
    ENV: prod
    K8S_MANIFEST_PATH: k8s-manifests/eva-seqcol/overlays/prod
    K8S_NAMESPACE: eva-seqcol-prod
    KUBECONFIG_FILE: $KUBECONFIG_FILE_PROD
  environment:
    name: prod
  only:
    - tags

# ============================================================================
# DEVELOPMENT: Deploy on main branch
# ============================================================================

build:docker:dev:
  extends: .build_docker
  variables:
    IMAGE_TAG: dev-$CI_COMMIT_SHORT_SHA
    IMAGE_LATEST: dev-latest
  only:
    - main

deploy-to-cluster:dev:
  extends: .update_and_deploy
  needs:
    - build:docker:dev
  variables:
    IMAGE_TAG: dev-$CI_COMMIT_SHORT_SHA
    ENV: development
    MAVEN_PROFILE: development
    K8S_MANIFEST_PATH: k8s-manifests/eva-seqcol/overlays/dev
    K8S_NAMESPACE: eva-seqcol-dev
    KUBECONFIG_FILE: $KUBECONFIG_FILE_DEV
  environment:
    name: development
  only:
    - main

# ============================================================================
# STAGING: Deploy on main branch
# ============================================================================

deploy-to-cluster:staging:
  extends: .update_and_deploy
  needs:
    - build:docker:dev
  variables:
    IMAGE_TAG: dev-$CI_COMMIT_SHORT_SHA
    ENV: staging
    MAVEN_PROFILE: production_processing
    K8S_MANIFEST_PATH: k8s-manifests/eva-seqcol/overlays/staging
    K8S_NAMESPACE: eva-seqcol-staging
    KUBECONFIG_FILE: $KUBECONFIG_FILE_STAGING
  environment:
    name: staging
  only:
    - main
